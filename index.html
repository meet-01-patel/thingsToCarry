<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workation Checklist</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --accent-hover: #0ea5e9;
      --card-bg: rgba(30, 41, 59, 0.7);
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      background-attachment: fixed;
    }

    /* Ambient background glow */
    .bg-glow {
      position: fixed;
      top: -20%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(56,189,248,0.15) 0%, rgba(0,0,0,0) 70%);
      border-radius: 50%;
      z-index: -1;
      pointer-events: none;
    }
    
    .bg-glow-2 {
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, rgba(0,0,0,0) 70%);
      border-radius: 50%;
      z-index: -1;
      pointer-events: none;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeInDown 0.8s ease-out;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(to right, #38bdf8, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: -1px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1.2rem;
      font-weight: 300;
    }

    .progress-container {
      width: 100%;
      max-width: 800px;
      margin-bottom: 2rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 1.5rem;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      animation: fadeIn 1s ease-out;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      font-weight: 500;
    }

    .progress-bar-bg {
      height: 12px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 6px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #38bdf8, #8b5cf6);
      border-radius: 6px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .container {
      width: 100%;
      max-width: 1000px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    .category-card {
      background: var(--card-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 1.5rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.6s ease-out forwards;
    }

    .category-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      border-color: rgba(56, 189, 248, 0.3);
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--glass-border);
    }

    .category-icon {
      width: 45px;
      height: 45px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(56,189,248,0.2), rgba(139,92,246,0.2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #38bdf8;
      border: 1px solid rgba(56, 189, 248, 0.1);
    }

    .category-title {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .item-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 8px;
      transition: background 0.2s ease;
    }

    .item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid var(--text-muted);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .item.checked .checkbox {
      background: var(--success);
      border-color: var(--success);
    }

    .item.checked .checkbox::after {
      content: '\f00c';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      color: white;
      font-size: 0.8rem;
    }

    .item-name {
      font-size: 1rem;
      color: var(--text-main);
      transition: color 0.2s ease, text-decoration 0.2s ease;
      line-height: 1.4;
    }

    .item.checked .item-name {
      color: var(--text-muted);
      text-decoration: line-through;
      text-decoration-color: var(--text-muted);
    }

    .loading {
      text-align: center;
      font-size: 1.5rem;
      color: var(--accent);
      margin-top: 4rem;
      animation: pulse 1.5s infinite;
    }

    /* Animations */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 { font-size: 2.2rem; }
      .container { grid-template-columns: 1fr; }
      body { padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>

  <div class="bg-glow"></div>
  <div class="bg-glow-2"></div>

  <div id="app">
    <div class="loading">
      <i class="fa-solid fa-spinner fa-spin"></i> Loading Journey...
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const app = document.getElementById('app');
      
      try {
        // Fetch configuration
        const response = await fetch('config.json');
        if (!response.ok) throw new Error('Failed to load config.json');
        const config = await response.json();

        // Check local storage for saved state
        const savedState = JSON.parse(localStorage.getItem('checklistState')) || {};
        
        let totalItems = 0;
        let checkedItems = 0;

        // Apply saved state and calculate totals
        config.categories.forEach(category => {
          category.items.forEach(item => {
            const itemKey = `${category.name}-${item.name}`;
            if (savedState[itemKey] !== undefined) {
              item.checked = savedState[itemKey];
            }
            totalItems++;
            if (item.checked) checkedItems++;
          });
        });

        const updateProgress = () => {
          const prcnt = totalItems === 0 ? 0 : Math.round((checkedItems / totalItems) * 100);
          document.getElementById('progress-bar').style.width = `${prcnt}%`;
          document.getElementById('progress-text').innerText = `${checkedItems} / ${totalItems} Packed (${prcnt}%)`;
        };

        const toggleItem = (categoryName, itemName, index, itemElement) => {
          const itemKey = `${categoryName}-${itemName}`;
          const isCurrentlyChecked = itemElement.classList.contains('checked');
          
          if (isCurrentlyChecked) {
            itemElement.classList.remove('checked');
            savedState[itemKey] = false;
            checkedItems--;
          } else {
            itemElement.classList.add('checked');
            savedState[itemKey] = true;
            checkedItems++;
          }
          
          localStorage.setItem('checklistState', JSON.stringify(savedState));
          updateProgress();
        };

        // Build UI
        let html = `
          <header>
            <h1>${config.title}</h1>
            <div class="subtitle"><i class="fa-regular fa-clock"></i> Duration: ${config.duration}</div>
          </header>
          
          <div class="progress-container">
            <div class="progress-header">
              <span>Packing Progress</span>
              <span id="progress-text"></span>
            </div>
            <div class="progress-bar-bg">
              <div class="progress-bar" id="progress-bar"></div>
            </div>
          </div>
          
          <div class="container" id="categories-container"></div>
        `;

        app.innerHTML = html;
        const container = document.getElementById('categories-container');

        config.categories.forEach((category, cIdx) => {
          const delay = cIdx * 0.1;
          const card = document.createElement('div');
          card.className = 'category-card';
          card.style.animationDelay = `${delay}s`;
          
          let itemsHtml = '';
          
          const list = document.createElement('div');
          list.className = 'item-list';
          
          category.items.forEach((item, iIdx) => {
            const itemDiv = document.createElement('div');
            itemDiv.className = `item ${item.checked ? 'checked' : ''}`;
            
            itemDiv.innerHTML = `
              <div class="checkbox"></div>
              <div class="item-name">${item.name}</div>
            `;
            
            itemDiv.addEventListener('click', () => {
              toggleItem(category.name, item.name, iIdx, itemDiv);
            });
            
            list.appendChild(itemDiv);
          });

          card.innerHTML = `
            <div class="category-header">
              <div class="category-icon">
                <i class="${category.icon}"></i>
              </div>
              <div class="category-title">${category.name}</div>
            </div>
          `;
          card.appendChild(list);
          container.appendChild(card);
        });

        updateProgress();

      } catch (error) {
        console.error('Error loading configuration:', error);
        app.innerHTML = `
          <div style="text-align:center; padding: 2rem; background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; border-radius: 12px;">
            <h2><i class="fa-solid fa-triangle-exclamation"></i> Error</h2>
            <p>Could not load the checklist configuration. Make sure <b>config.json</b> exists in the same directory.</p>
          </div>
        `;
      }
    });
  </script>
</body>
</html>
